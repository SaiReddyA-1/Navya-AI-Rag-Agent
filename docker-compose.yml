services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: navai-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 30

  app:
    build: .
    container_name: navai-app
    env_file: .env
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    volumes:
      - ./Data:/app/Data
    depends_on:
      opensearch:
        condition: service_healthy
    command: >
      sh -c "python scripts/ingest.py && streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0"

volumes:
  opensearch-data:
